          - paragraph [ref=e426]: 当前项目使用颜色区分所属（Friendly=#87CEEB 浅蓝, Enemy=#FF9F43 橙色, Neutral=灰）。所有 5 种风格均保留这一约定：
          - list [ref=e427]:
            - listitem [ref=e428]: "• A: 左侧竖条色带"
            - listitem [ref=e429]: "• B: 整体边框色调 + 渐变背景"
            - listitem [ref=e430]: "• C: 顶部名称区块的强调边框"
            - listitem [ref=e431]: "• D: 气泡尾巴方向 + 气泡颜色"
            - listitem [ref=e432]: "• E: 卡片表面主题色 + 圆点指示器"
        - generic [ref=e433]:
