            - text: 稀有度（Rarity）
          - paragraph [ref=e436]: 放弃传统星星/宝石图标，改用更现代的信号：
          - list [ref=e437]:
            - listitem [ref=e438]:
              - text: •
              - strong [ref=e439]: Common
              - text: ": 极简，无发光，灰色标签"
            - listitem [ref=e440]:
              - text: •
              - strong [ref=e441]: Uncommon
              - text: ": 微光边框，冷蓝色调"
            - listitem [ref=e442]:
              - text: •
              - strong [ref=e443]: Rare
              - text: ": 呼吸脉冲动画，金色发光"
            - listitem [ref=e444]:
